<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Virtual - Juegos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Script de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Menú superior (Oculto por defecto) -->
    <header id="user-header" class="hidden">
        <span id="user-email">Cargando...</span>
        <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
    </header>

    <h1>Casino Virtual</h1>

    <!-- ==========================================
         SECCIÓN DE AUTENTICACIÓN
         ========================================== -->
    <section id="auth-section">
        
        <!-- Formulario de Iniciar Sesión -->
        <div id="login-box" class="auth-box">
            <h2>Iniciar Sesión</h2>
            <input type="email" id="login-email" placeholder="Correo electrónico" required>
            <input type="password" id="login-password" placeholder="Contraseña" required>
            <button onclick="iniciarSesion()" class="btn-primary">Entrar</button>
            <p class="auth-link" onclick="mostrarFormulario('register-box')">¿No tienes cuenta? Regístrate aquí</p>
            <p class="auth-link" onclick="mostrarFormulario('reset-box')">¿Olvidaste tu contraseña?</p>
            <p id="login-error" class="error-msg"></p>
        </div>

        <!-- Formulario de Crear Cuenta -->
        <div id="register-box" class="auth-box hidden">
            <h2>Crear Cuenta</h2>
            <input type="email" id="reg-email" placeholder="Correo electrónico" required>
            <input type="password" id="reg-password" placeholder="Contraseña (Mín. 6 caracteres)" required>
            <button onclick="crearCuenta()" class="btn-primary">Registrarse</button>
            <p class="auth-link" onclick="mostrarFormulario('login-box')">¿Ya tienes cuenta? Inicia sesión</p>
            <p id="reg-error" class="error-msg"></p>
            <p id="reg-success" class="success-msg"></p>
        </div>

        <!-- Formulario de Recuperar Contraseña -->
        <div id="reset-box" class="auth-box hidden">
            <h2>Recuperar Contraseña</h2>
            <p class="instruction">Ingresa tu correo y te enviaremos un enlace.</p>
            <input type="email" id="reset-email" placeholder="Correo electrónico" required>
            <button onclick="recuperarPassword()" class="btn-primary">Enviar enlace</button>
            <p class="auth-link" onclick="mostrarFormulario('login-box')">Volver al inicio de sesión</p>
            <p id="reset-error" class="error-msg"></p>
            <p id="reset-success" class="success-msg"></p>
        </div>

    </section>

    <!-- ==========================================
         SECCIÓN DE JUEGOS (Oculta por defecto)
         ========================================== -->
    <section id="juegos-section" class="hidden">
        <h2>Apartado de Juegos</h2>
        <div class="games-section" id="contenedor-juegos">
            <p>Cargando juegos...</p>
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
