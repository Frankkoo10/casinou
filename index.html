<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Virtual - Juegos</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0b0b; color: #fff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #ffd700; margin-bottom: 40px; }
        .games-section { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .game-card { 
            background: #1a1a1a; 
            padding: 30px 50px; 
            border: 2px solid #ffd700; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .game-card:hover { background: #ffd700; color: #000; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>Casino Virtual</h1>
    
    <section id="juegos">
        <h2>Apartado de Juegos</h2>
        <div class="games-section">
            <a href="https://frankkoo10.github.io/crazytime/" class="game-card">CRAZY TIME</a>
            <a href="https://frankkoo10.github.io/bj/" class="game-card">BLACKJACK</a>
            <a href="https://frankkoo10.github.io/caballos/" class="game-card">CARRERAS DE CABALLOS</a>
        </div>
    </section>

</body>
</html>
